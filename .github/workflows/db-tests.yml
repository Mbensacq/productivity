name: DB & RLS tests

on:
  push:
    branches: [main]
    paths:
      - 'supabase/**'
  pull_request:
    paths:
      - 'supabase/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start local Supabase stack
        run: supabase start
      - name: Run pgTAP RLS tests
        run: supabase test db
      - name: Stop stack
        if: always()
        run: supabase stop
